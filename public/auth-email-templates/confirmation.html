<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f5; }
    .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .header { background-color: #000000; padding: 30px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 24px; letter-spacing: -1px; font-weight: 900; text-transform: uppercase; }
    .content { padding: 40px 30px; color: #333333; text-align: center; }
    .welcome-text { font-size: 18px; font-weight: 600; margin-bottom: 10px; color: #111; }
    .body-text { color: #666; font-size: 15px; margin-bottom: 30px; }
    .btn { display: inline-block; background-color: #dc2626; color: #ffffff; padding: 16px 32px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 16px; transition: background 0.3s; box-shadow: 0 4px 14px rgba(220, 38, 38, 0.3); }
    .btn:hover { background-color: #b91c1c; }
    .footer { background-color: #f9fafb; padding: 20px; text-align: center; font-size: 12px; color: #888; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>KITAPLAB</h1>
    </div>

    <div class="content">
      <div class="welcome-text">Aramıza Hoş Geldin! 👋</div>
      <p class="body-text">
        Hesabını oluşturmak için son bir adım kaldı. Aşağıdaki butona tıklayarak e-posta adresini doğrulayabilir ve hemen yazmaya başlayabilirsin.
      </p>

      <a href="{{ .ConfirmationURL }}" class="btn">Hesabımı Doğrula</a>
    </div>

    <div class="footer">
      © 2026 KitapLab. Tüm hakları saklıdır.<br>
      Bu maili siz talep etmediyseniz görmezden gelebilirsiniz.
    </div>
  </div>
</body>
</html>
